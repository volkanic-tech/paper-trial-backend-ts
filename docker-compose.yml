version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paper-trail-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:17-alpine
    container_name: paper-trail-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paper_trail_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paper_trail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: